name: Release

# Cutting a release: push a semver tag, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
# This builds every artifact and attaches them to a GitHub Release for the tag.
#
# All assets are shipped as raw binaries (no archives) — download the one for
# your platform and run it. On Linux/macOS: `chmod +x` then run.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  WAILS_VERSION: v2.12.0

jobs:
  # ---------------------------------------------------------------------------
  # CLI / TUI — a single static binary per target, no CGO, cross-compiled.
  # ---------------------------------------------------------------------------
  cli:
    name: CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: '' }
          - { goos: linux, goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p out
          go build -trimpath \
            -ldflags "-s -w -X viaduct/cmd.version=${GITHUB_REF_NAME}" \
            -o "out/viaduct-${GOOS}-${GOARCH}${{ matrix.ext }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Desktop (Wails) for Linux — native build, links GTK3 + WebKit2GTK 4.1.
  # The resulting binary needs libgtk-3-0 + libwebkit2gtk-4.1-0 at runtime
  # (documented in the release notes).
  # ---------------------------------------------------------------------------
  desktop-linux:
    name: Desktop (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app
        working-directory: desktop
        run: wails build -tags webkit2_41 -trimpath

      - name: Collect binary
        run: |
          set -euo pipefail
          mkdir -p out
          cp desktop/build/bin/viaduct-desktop out/viaduct-desktop-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-amd64
          path: out/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Desktop (Wails) for Windows — cross-compiled from Linux. Produces both a
  # portable .exe and an NSIS installer (which auto-installs the WebView2
  # runtime if it's missing). Uses makensis from the `nsis` package.
  # ---------------------------------------------------------------------------
  desktop-windows:
    name: Desktop (windows/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app (portable + installer)
        working-directory: desktop
        run: wails build -platform windows/amd64 -nsis -trimpath

      - name: Collect binaries
        run: |
          set -euo pipefail
          mkdir -p out
          cp desktop/build/bin/viaduct-desktop.exe \
            out/viaduct-desktop-windows-amd64.exe
          cp desktop/build/bin/viaduct-desktop-amd64-installer.exe \
            out/viaduct-desktop-windows-amd64-installer.exe

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-amd64
          path: out/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Collect every binary and publish one GitHub Release for the tag.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [cli, desktop-linux, desktop-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ### Downloads

            Grab the binary for your platform and run it directly.

            **CLI / TUI** (single static binary, no dependencies):
            - Linux: `viaduct-linux-amd64` / `viaduct-linux-arm64`
            - Windows: `viaduct-windows-amd64.exe`

            On Linux/macOS: `chmod +x viaduct-linux-amd64 && ./viaduct-linux-amd64`

            **Desktop app** (GUI):
            - Windows: `viaduct-desktop-windows-amd64-installer.exe` (installer,
              sets up WebView2 automatically) or
              `viaduct-desktop-windows-amd64.exe` (portable)
            - Linux: `viaduct-desktop-linux-amd64` — needs the system WebKit/GTK
              libraries at runtime:
              - Debian/Ubuntu: `sudo apt install libgtk-3-0 libwebkit2gtk-4.1-0`
              - Fedora: `sudo dnf install gtk3 webkit2gtk4.1`
              - Arch: `sudo pacman -S gtk3 webkit2gtk-4.1`

            > The Windows builds are unsigned, so SmartScreen may warn about an
            > unknown publisher — choose **More info → Run anyway**.

            ---
