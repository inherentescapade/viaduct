name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # The desktop (Wails) package links against GTK3 + WebKit2GTK, which must
      # be present to compile/vet/test it. Modern runners ship WebKit 4.1, so we
      # build with the matching `-tags webkit2_41` (see desktop/Makefile).
      - name: Install desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: go vet
        run: go vet -tags webkit2_41 ./...

      - name: go test
        run: go test -tags webkit2_41 ./...

      - name: CLI smoke build
        run: go build -o /dev/null .
